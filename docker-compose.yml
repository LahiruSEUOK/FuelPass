version: '3.8'

services:
  fuellk-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_ADMIN_PASSWORD: ${VITE_ADMIN_PASSWORD}
    container_name: fuellk-web
    ports:
      # Maps external port 5555 to internal port 80
      - "5555:5555"
    restart: unless-stopped
    # If Vite required env variables at RUNTIME (not build time), you would add them here. 
    # Since Vite bundles at BUILD time, your .env file needs to be present during build.
